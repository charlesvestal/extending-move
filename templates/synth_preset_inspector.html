<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synth Preset Inspector</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="inspector">
        <h2>Synth Preset Inspector</h2>
        <form method="POST" action="/synth-presets">
            <input type="hidden" name="action" value="select_preset">
            <select name="preset_select" id="preset-select">
                {{ options }}
            </select>
        </form>
        <div class="result-box">
            {{ polyphony_html }}
        </div>
    </div>
    <script src="/static/synth.js"></script>
</body>
</html>
