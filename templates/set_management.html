<h2>MIDI Upload</h2>
<div id="result-message">{message_html}</div>

<div class="set-management-container">
    <!-- Step 1: Upload and Analyze MIDI -->
    <div id="midi-upload-section" class="midi-upload-section">
        <h3>Step 1: Upload MIDI File</h3>
        <p>Upload a MIDI file to analyze its channels and generate an Ableton Live set.</p>
        
        <form method="post" action="/set-management" enctype="multipart/form-data" id="analyze-form">
            <input type="hidden" name="action" value="analyze_midi" />
            
            <div class="form-group">
                <label for="midi_file">MIDI File:</label>
                <input type="file" name="midi_file" id="midi_file" accept=".mid,.midi" required />
                <small>Supported formats: .mid, .midi</small>
            </div>
            
            <button type="submit" class="analyze-button">Analyze MIDI File</button>
        </form>
    </div>

    <!-- Step 2: Channel Selection and Generation -->
    <div id="channel-selection-section" class="channel-selection-section">
        <h3>Step 2: Select Channels and Generate Set</h3>
        
        <div id="channel-info">
            {channel_selection_html}
        </div>
        
        <form method="post" action="/set-management" enctype="multipart/form-data" id="generate-form">
            <input type="hidden" name="action" value="upload_midi" />
            <input type="hidden" name="midi_filepath" value="{midi_filepath}" />
            
            <div class="form-group">
                <label for="midi_type">MIDI Type:</label>
                <select name="midi_type" id="midi_type" required>
                    <option value="melodic" selected>Melodic MIDI</option>
                    <option value="drum">Drum MIDI (808)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="set_name">Set Name:</label>
                <input type="text" name="set_name" id="set_name" placeholder="My MIDI Set" required />
            </div>

            <div class="form-group">
                <label for="tempo">Tempo (BPM):</label>
                <input type="number" name="tempo" id="tempo" min="20" max="300" placeholder="Auto-detect from MIDI" />
                <small>Leave blank to use tempo from MIDI file (or default 120 BPM)</small>
            </div>

            <div class="form-group">
                <label for="pad_index">Device Pad:</label>
                <select name="pad_index" id="pad_index" required>
                    {{ pad_options }}
                </select>
            </div>
            
            <div class="form-group">
                <label for="pad_color">Pad Color:</label>
                <select name="pad_color" id="pad_color" required>
                    {{ pad_color_options }}
                </select>
            </div>
            
            <button type="submit" class="generate-button">Generate Set from MIDI</button>
            <button type="button" class="back-button" onclick="resetToUpload()">Upload Different File</button>
        </form>
    </div>
</div>

<style>
.set-management-container {
    max-width: 700px;
    margin: 0 auto;
}

.midi-upload-section,
.channel-selection-section {
    padding: 30px;
    background: #f9f9f9;
    border: 1px solid #ddd;
    border-radius: 8px;
    margin-bottom: 20px;
}

.midi-upload-section h3,
.channel-selection-section h3 {
    margin-top: 0;
    color: #333;
}

.midi-upload-section p,
.channel-selection-section p {
    color: #666;
    margin-bottom: 25px;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
    color: #333;
}

.form-group input[type="text"],
.form-group input[type="number"],
.form-group input[type="file"],
.form-group select {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 14px;
}

.form-group input[type="file"] {
    padding: 6px;
    background: white;
}

.form-group small {
    display: block;
    margin-top: 5px;
    color: #666;
    font-size: 12px;
}

.analyze-button,
.generate-button {
    padding: 12px 30px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.3s;
    margin-right: 10px;
}

.analyze-button:hover,
.generate-button:hover {
    background: #218838;
}

.back-button {
    padding: 12px 30px;
    background: #6c757d;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.3s;
}

.back-button:hover {
    background: #5a6268;
}

/* Channel selection table styles */
.channel-table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
    background: white;
    border: 1px solid #ddd;
}

.channel-table thead {
    background: #f8f9fa;
}

.channel-table th,
.channel-table td {
    padding: 10px;
    text-align: left;
    border-bottom: 1px solid #ddd;
}

.channel-table th {
    font-weight: bold;
    color: #333;
}

.channel-table tr:hover {
    background: #f8f9fa;
}

.channel-table input[type="checkbox"] {
    width: auto;
    margin: 0;
}

.channel-options {
    margin: 20px 0;
    padding: 15px;
    background: #e9ecef;
    border-radius: 4px;
}

.channel-options label {
    display: flex;
    align-items: center;
    font-weight: normal;
    margin: 0;
}

.channel-options input[type="checkbox"] {
    margin-right: 10px;
}

#result-message {
    margin-bottom: 20px;
}

.success {
    padding: 15px;
    background: #d4edda;
    border: 1px solid #c3e6cb;
    border-radius: 4px;
    color: #155724;
}

.error {
    padding: 15px;
    background: #f8d7da;
    border: 1px solid #f5c6cb;
    border-radius: 4px;
    color: #721c24;
}
</style>

<script>
// Check if we have channel selection HTML on page load
document.addEventListener('DOMContentLoaded', function() {
    const channelInfo = document.getElementById('channel-info');
    const uploadSection = document.getElementById('midi-upload-section');
    const channelSection = document.getElementById('channel-selection-section');
    
    // Check if we have actual channel content (not just the placeholder)
    const hasChannelContent = channelInfo && 
                            channelInfo.innerHTML.trim() !== '' && 
                            channelInfo.innerHTML.trim() !== '{channel_selection_html}';
    
    if (hasChannelContent) {
        // We have channel selection HTML, show the second step
        uploadSection.style.display = 'none';
        channelSection.style.display = 'block';
    } else {
        // No channel content, show upload form
        uploadSection.style.display = 'block';
        channelSection.style.display = 'none';
    }
});

function resetToUpload() {
    // Show upload section, hide channel selection
    document.getElementById('midi-upload-section').style.display = 'block';
    document.getElementById('channel-selection-section').style.display = 'none';
    
    // Clear the file input
    document.getElementById('midi_file').value = '';
    uploadedMidiFile = null;
    
    // Clear any messages
    const messageDiv = document.getElementById('result-message');
    if (messageDiv) {
        messageDiv.innerHTML = '';
    }
}

// Handle drum type selection - disable channel selection for drums
document.addEventListener('DOMContentLoaded', function() {
    const midiTypeSelect = document.getElementById('midi_type');
    if (midiTypeSelect) {
        midiTypeSelect.addEventListener('change', function() {
            const channelInfo = document.getElementById('channel-info');
            if (this.value === 'drum' && channelInfo) {
                // Disable channel selection for drum mode
                channelInfo.style.opacity = '0.5';
                channelInfo.style.pointerEvents = 'none';
                
                // Add a note
                const note = document.createElement('p');
                note.style.color = '#666';
                note.style.fontStyle = 'italic';
                note.textContent = 'Channel selection is not available for drum MIDI files.';
                channelInfo.insertBefore(note, channelInfo.firstChild);
            } else if (channelInfo) {
                // Re-enable for melodic
                channelInfo.style.opacity = '1';
                channelInfo.style.pointerEvents = 'auto';
                
                // Remove the note if it exists
                const note = channelInfo.querySelector('p');
                if (note && note.textContent.includes('Channel selection is not available')) {
                    note.remove();
                }
            }
        });
    }
});
</script>
