<html>
    <head>
        <title>Drum Rack Inspector</title>
        <link rel="stylesheet" href="/style.css">
    </head>
    <body>
        <h2>Drum Rack Inspector</h2>
        {{ message_html }}
        {% if sample_uris %}
            <h3>Sample URIs for {{ selected_file }}:</h3>
            <ul>
                {% for uri in sample_uris %}
                    <li>{{ uri }}</li>
                {% endfor %}
            </ul>
        {% else %}
            <h3>Select a Drum Rack preset:</h3>
            <form method="get" action="/drum_rack_inspector">
                <select name="file">
                    {% for file in ablpreset_files %}
                        <option value="{{ file }}">{{ file }}</option>
                    {% endfor %}
                </select>
                <button type="submit">Inspect</button>
            </form>
        {% endif %}
    </body>
</html>
